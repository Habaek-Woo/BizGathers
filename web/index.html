<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/brand/LogoNoBG.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BizGathers</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('bizgathers-theme');
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved === 'light' || saved === 'dark' ? saved : (systemDark ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div id="app-preloader" aria-hidden="true" data-started-at="">
      <div class="preloader-card">
        <img class="preloader-logo" src="/src/assets/brand/LogoNoBG.png" alt="" />
        <div class="preloader-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<style>
  #app-preloader {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: var(--bg, #161315);
    color: var(--fg, #f6f3ee);
    z-index: 9999;
    opacity: 1;
    transition: opacity 240ms ease;
  }
  #app-preloader.is-hiding {
    opacity: 0;
  }
  #app-preloader .preloader-card {
    display: grid;
    gap: 14px;
    place-items: center;
    padding: 22px 26px;
    border-radius: 18px;
    border: 1px solid color-mix(in oklab, var(--fg, #f6f3ee) 14%, transparent);
    background: color-mix(in oklab, var(--bg, #161315) 78%, transparent);
    box-shadow: 0 18px 60px rgba(0,0,0,0.25);
  }
  #app-preloader .preloader-logo {
    width: 64px;
    height: 64px;
    object-fit: contain;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.18));
  }
  #app-preloader .preloader-dots {
    display: inline-flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  #app-preloader .preloader-dots span {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: var(--brand, #f1c617);
    opacity: 0.35;
    animation: bg-preloader 900ms infinite ease-in-out;
  }
  #app-preloader .preloader-dots span:nth-child(2) { animation-delay: 120ms; }
  #app-preloader .preloader-dots span:nth-child(3) { animation-delay: 240ms; }
  @keyframes bg-preloader {
    0%, 100% { transform: translateY(0); opacity: 0.35; }
    50% { transform: translateY(-5px); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    #app-preloader .preloader-dots span { animation: none; opacity: 0.65; }
  }
</style>

<script>
  (function () {
    var el = document.getElementById('app-preloader');
    if (el) el.setAttribute('data-started-at', String(Date.now()));
  })();
</script>
